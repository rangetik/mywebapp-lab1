version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: kpi_postgres_db
    restart: always
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: "12345678"
      POSTGRES_DB: mywebapp
    volumes:
      - pg_database_data:/var/lib/postgresql/data
    networks:
      - kpi-custom-network

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kpi_node_app
    restart: always
    depends_on:
      - db
    networks:
      - kpi-custom-network

  nginx:
    image: nginx:alpine
    container_name: kpi_nginx_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    networks:
      - kpi-custom-network

volumes:
  pg_database_data:
    driver: local

networks:
  kpi-custom-network:
    driver: bridge
